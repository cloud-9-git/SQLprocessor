<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF6FF"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D9F99D"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#BFDBFE"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="box3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="box4" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FBCFE8"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #475569; }
      .label { font: 700 22px Arial, sans-serif; fill: #0F172A; }
      .body { font: 500 17px Arial, sans-serif; fill: #334155; }
      .small { font: 600 16px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1400" height="820" rx="28" fill="url(#bg)"/>
  <text x="70" y="78" class="title">SQL Processor Architecture</text>
  <text x="70" y="112" class="subtitle">CLI input, parser pipeline, execution engine, and file-based storage in one view</text>

  <rect x="70" y="180" width="220" height="120" rx="24" fill="url(#box1)" filter="url(#shadow)"/>
  <text x="110" y="228" class="label">SQL File</text>
  <text x="110" y="260" class="body">case_basic_users_run.txt</text>
  <text x="110" y="286" class="body">multi-statement input</text>

  <rect x="360" y="180" width="240" height="120" rx="24" fill="url(#box2)" filter="url(#shadow)"/>
  <text x="430" y="228" class="label">CLI / main.c</text>
  <text x="400" y="260" class="body">read file, strip comments,</text>
  <text x="398" y="286" class="body">split statements by semicolon</text>

  <rect x="670" y="180" width="260" height="120" rx="24" fill="url(#box3)" filter="url(#shadow)"/>
  <text x="740" y="228" class="label">Lexer + Parser</text>
  <text x="715" y="260" class="body">tokenize SQL and build</text>
  <text x="742" y="286" class="body">Statement struct</text>

  <rect x="1000" y="180" width="280" height="120" rx="24" fill="url(#box4)" filter="url(#shadow)"/>
  <text x="1082" y="228" class="label">Executor</text>
  <text x="1040" y="260" class="body">SELECT / INSERT / UPDATE / DELETE</text>
  <text x="1054" y="286" class="body">constraint checks and write-back</text>

  <rect x="970" y="430" width="310" height="160" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="1065" y="480" class="label">CSV Tables</text>
  <text x="1020" y="516" class="body">case_basic_users.csv</text>
  <text x="1020" y="544" class="body">case_constraints_users.csv</text>
  <text x="1020" y="572" class="body">file-based database storage</text>

  <rect x="640" y="430" width="250" height="160" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
  <text x="706" y="480" class="label">Output</text>
  <text x="680" y="516" class="body">SELECT result rows</text>
  <text x="680" y="544" class="body">error / success messages</text>
  <text x="680" y="572" class="body">demo-friendly console logs</text>

  <rect x="170" y="430" width="390" height="210" rx="24" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2" filter="url(#shadow)"/>
  <text x="255" y="480" class="label">Differentiators</text>
  <text x="210" y="524" class="body">• PK / UK / NN constraint validation</text>
  <text x="210" y="556" class="body">• quoted CSV value handling</text>
  <text x="210" y="588" class="body">• in-memory table cache</text>
  <text x="210" y="620" class="body">• requirement plus UPDATE / DELETE</text>

  <path d="M290 240H360" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M600 240H670" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M930 240H1000" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1140 300V430" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1000 300L804 430" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M765 430L560 566" stroke="#64748B" stroke-width="3" stroke-dasharray="10 10"/>

  <text x="74" y="740" class="small">Required: INSERT, SELECT</text>
  <text x="360" y="740" class="small">Extended: UPDATE, DELETE, constraints, quoted values, cache</text>
</svg>
